name: Build (GHCR + RouterOS tar release)

on:
  schedule:
    - cron: "17 19 * * 1"   # weekly, Monday 03:17 Beijing time ("17 19 * * *" = daily)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - "config/**"
      - ".github/workflows/build.yml"

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # needed to create releases
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest upstream versions
        id: ver
        run: |
          MOSDNS=$(curl -fsSL https://api.github.com/repos/IrineSistiana/mosdns/releases/latest | jq -r .tag_name)
          AGH=$(curl -fsSL https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r .tag_name)
          echo "mosdns=$MOSDNS"           >> "$GITHUB_OUTPUT"
          echo "agh=$AGH"                 >> "$GITHUB_OUTPUT"
          echo "tag=mosdns-${MOSDNS}_agh-${AGH}" >> "$GITHUB_OUTPUT"
          echo "Building mosdns $MOSDNS + AdGuardHome $AGH"

      - name: Config last-change info
        id: cfg
        run: |
          M=$(git log -1 --format='%cs (%h) %s' -- config/mosdns.yaml)
          A=$(git log -1 --format='%cs (%h) %s' -- config/AdGuardHome.yaml)
          echo "mosdns_cfg=$M" >> "$GITHUB_OUTPUT"
          echo "agh_cfg=$A"    >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push to GHCR (backup registry)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: |
            MOSDNS_VERSION=${{ steps.ver.outputs.mosdns }}
            ADGUARD_VERSION=${{ steps.ver.outputs.agh }}
          tags: |
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.ver.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build arm64 tar for RouterOS offline import
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          build-args: |
            MOSDNS_VERSION=${{ steps.ver.outputs.mosdns }}
            ADGUARD_VERSION=${{ steps.ver.outputs.agh }}
          tags: mosdns-adg:latest
          outputs: type=docker,dest=/tmp/mosdns-adg.tar
          cache-from: type=gha

      # If a release with this version tag already exists (e.g. upstream
      # versions unchanged since last run), delete it and its tag first,
      # so every run produces a brand-new release with a fresh date.
      - name: Delete previous release with same tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.ver.outputs.tag }}" \
            --repo "${{ github.repository }}" --cleanup-tag --yes || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "mosdns ${{ steps.ver.outputs.mosdns }} + AdGuardHome ${{ steps.ver.outputs.agh }}"
          body: |
            arm64 image tar for MikroTik RouterOS offline import (RB5009).

            - mosdns: ${{ steps.ver.outputs.mosdns }}
            - AdGuardHome: ${{ steps.ver.outputs.agh }}
            - CN rule lists: refreshed at build time (${{ github.run_id }})

            Default config last changed:
            - config/mosdns.yaml: ${{ steps.cfg.outputs.mosdns_cfg }}
            - config/AdGuardHome.yaml: ${{ steps.cfg.outputs.agh_cfg }}
            (If these dates are older than your install, this release changes
            binaries/rule lists only — nothing to adopt on your router.)

            Install:
            1. Upload mosdns-adg.tar to usb1/ on the router
            2. /container add file=usb1/mosdns-adg.tar interface=veth-dns \
                 root-dir=usb1/containers/dns mounts=dns-data envlist=dns-env \
                 start-on-boot=yes logging=yes comment="mosdns + AdGuard Home"
          files: /tmp/mosdns-adg.tar
          make_latest: true
