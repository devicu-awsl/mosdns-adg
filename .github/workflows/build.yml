name: Build (GHCR + RouterOS tar)

on:
  schedule:
    - cron: "17 19 * * 1"   # weekly, Monday 03:17 Beijing time
  workflow_dispatch:         # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - "config/**"
      - ".github/workflows/build.yml"

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest upstream versions
        id: ver
        run: |
          MOSDNS=$(curl -fsSL https://api.github.com/repos/IrineSistiana/mosdns/releases/latest | jq -r .tag_name)
          AGH=$(curl -fsSL https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r .tag_name)
          echo "mosdns=$MOSDNS"           >> "$GITHUB_OUTPUT"
          echo "agh=$AGH"                 >> "$GITHUB_OUTPUT"
          echo "tag=${MOSDNS}_agh-${AGH}" >> "$GITHUB_OUTPUT"
          echo "Building mosdns $MOSDNS + AdGuardHome $AGH"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push to GHCR (backup registry)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: |
            MOSDNS_VERSION=${{ steps.ver.outputs.mosdns }}
            ADGUARD_VERSION=${{ steps.ver.outputs.agh }}
          tags: |
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.ver.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build arm64 tar for RouterOS offline import
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          build-args: |
            MOSDNS_VERSION=${{ steps.ver.outputs.mosdns }}
            ADGUARD_VERSION=${{ steps.ver.outputs.agh }}
          tags: mosdns-adg:latest
          outputs: type=docker,dest=/tmp/mosdns-adg.tar
          cache-from: type=gha

      - name: Upload tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosdns-adg
          path: /tmp/mosdns-adg.tar
          retention-days: 30