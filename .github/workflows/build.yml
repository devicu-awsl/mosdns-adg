name: Build & Push (auto latest mosdns + AdGuard Home)

on:
  schedule:
    - cron: "17 19 * * *"   # 19:17 UTC = 03:17 Beijing time, daily
  workflow_dispatch:         # manual trigger button
  push:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - "config/**"
      - ".github/workflows/build.yml"

env:
  # >>> CHANGE THIS to your Docker Hub repo <<<
  DOCKERHUB_IMAGE: yourdockerhubuser/mosdns-adguard
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest upstream versions
        id: ver
        run: |
          MOSDNS=$(curl -fsSL https://api.github.com/repos/IrineSistiana/mosdns/releases/latest | jq -r .tag_name)
          AGH=$(curl -fsSL https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r .tag_name)
          echo "mosdns=$MOSDNS"          >> "$GITHUB_OUTPUT"
          echo "agh=$AGH"                >> "$GITHUB_OUTPUT"
          echo "tag=${MOSDNS}_agh-${AGH}" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%Y%m%d)"    >> "$GITHUB_OUTPUT"
          echo "Building mosdns $MOSDNS + AdGuardHome $AGH"

      # Skip scheduled rebuilds only if nothing changed AND today's image exists.
      # (We still rebuild daily so the bundled CN rule lists stay fresh.)
      - name: Check if today's build already exists
        id: exists
        run: |
          if docker manifest inspect "$DOCKERHUB_IMAGE:${{ steps.ver.outputs.tag }}-${{ steps.ver.outputs.date }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
        if: steps.exists.outputs.skip == 'false'

      - uses: docker/setup-buildx-action@v3
        if: steps.exists.outputs.skip == 'false'

      - name: Login to Docker Hub
        if: steps.exists.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: steps.exists.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        if: steps.exists.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64,linux/amd64   # RB5009 = arm64
          push: true
          build-args: |
            MOSDNS_VERSION=${{ steps.ver.outputs.mosdns }}
            ADGUARD_VERSION=${{ steps.ver.outputs.agh }}
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.ver.outputs.tag }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.ver.outputs.tag }}-${{ steps.ver.outputs.date }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.ver.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # arm64-only "docker save" tarball for offline import on RouterOS
      # (Actions tab -> run -> Artifacts -> mosdns-adg)
      - name: Build arm64 tar for RouterOS offline import
        if: steps.exists.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          build-args: |
            MOSDNS_VERSION=${{ steps.ver.outputs.mosdns }}
            ADGUARD_VERSION=${{ steps.ver.outputs.agh }}
          tags: mosdns-adg:latest
          outputs: type=docker,dest=/tmp/mosdns-adg.tar
          cache-from: type=gha

      - name: Upload tar artifact
        if: steps.exists.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: mosdns-adg
          path: /tmp/mosdns-adg.tar
          retention-days: 30
