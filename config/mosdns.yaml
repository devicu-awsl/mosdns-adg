# mosdns v5 — CN / foreign split resolver
# Listens on 127.0.0.1:5335 (and 0.0.0.0 for debugging); AdGuard Home
# sits in front of it on :53 and uses this as its only upstream.
#
# China domains  -> AliDNS / DNSPod (plain UDP, fast, correct CDN results)
# Everything else -> DoH to 1.1.1.1 / 8.8.8.8
#   NOTE (Shanghai): plain 8.8.8.8 UDP is poisoned. DoH to the raw IPs
#   usually works, but if you run a proxy (e.g. clash/sing-box) it is far
#   more reliable to point forward_remote at your proxy's DNS port instead,
#   e.g. addr: "udp://192.168.88.x:1053".

log:
  level: warn

# HTTP API for maintenance (metrics, cache dump/flush)
#   http://<container-ip>:8080/metrics
#   http://<container-ip>:8080/plugins/cache/flush
#   http://<container-ip>:8080/plugins/cache/dump
api:
  http: "0.0.0.0:8080"

plugins:
  # ---------- data sets ----------
  - tag: geosite_cn
    type: domain_set
    args:
      files:
        - /data/mosdns/rules/geosite_cn.txt
        - /data/mosdns/rules/geosite_apple_cn.txt

  - tag: geosite_proxy
    type: domain_set
    args:
      files:
        - /data/mosdns/rules/geosite_proxy.txt

  - tag: geoip_cn
    type: ip_set
    args:
      files:
        - /data/mosdns/rules/geoip_cn.txt

  # ---------- Apple split-DNS domain sets ----------
  # Bare entry = suffix match (domain + all subdomains, i.e. "*."),
  # full: = exact match. See the Apple rules in the main sequence below.
  #
  # [Host] *.tv.apple.com / *.video.apple.com = 1.1.1.1 :
  # force Apple TV+/Music streaming onto Apple's INTERNATIONAL CDN via
  # Cloudflare DoH.
  - tag: apple_intl_host
    type: domain_set
    args:
      exps:
        - tv.apple.com
        - video.apple.com

  # PROXY -> resolve via remote DoH so DNS results match a proxied egress.
  - tag: apple_intl
    type: domain_set
    args:
      exps:
        - fitness.apple.com
        - arcade.apple.com
        - full:games.apple.com

  # iCloud Private Relay setup/egress + Apple DoH -> clean international DNS.
  # These must resolve to genuine Apple/relay IPs (not a China CDN or poisoned
  # result) for Private Relay to come up. Replaces the previous broad
  # akamaized.net rule with just the Apple-relay host. Ref: Control D iCloud
  # Private Relay excluded-domains list. Matched BEFORE apple_direct so the
  # aaplimg.com relay host escapes the China-DNS bucket below.
  - tag: apple_relay
    type: domain_set
    args:
      exps:
        - apple-dns.net
        - apple-relay.cloudflare.com
        - apple-relay.akamaized.net
        - apple-relay.fastly-edge.com
        - doh.dns.apple.com.v.aaplimg.com

  # DIRECT -> keep on China DNS for China CDN nodes.
  - tag: apple_direct
    type: domain_set
    args:
      exps:
        - apple.com.cn
        - icloud.com.cn
        - full:music.apple.com
        - mzstatic.com
        - aaplimg.com
        - full:streamingaudio.itunes.apple.com
        - audio-ssl.itunes.apple.com

  # ---------- cache ----------
  - tag: cache
    type: cache
    args:
      size: 8192
      lazy_cache_ttl: 86400
      dump_file: /data/mosdns/cache.dump
      dump_interval: 600

  # ---------- upstreams ----------
  - tag: forward_china
    type: forward
    args:
      concurrent: 2
      upstreams:
        - addr: "udp://223.5.5.5"     # AliDNS
        - addr: "udp://119.29.29.29"  # DNSPod

  - tag: forward_remote
    type: forward
    args:
      concurrent: 2
      upstreams:
        - addr: "https://1.1.1.1/dns-query"
        - addr: "https://8.8.8.8/dns-query"
        # If you have a local proxy providing clean DNS, prefer it:
        # - addr: "udp://192.168.88.2:1053"

  # Cloudflare-only upstream for the Apple [Host] override (server:1.1.1.1)
  - tag: forward_cloudflare
    type: forward
    args:
      upstreams:
        - addr: "https://1.1.1.1/dns-query"

  # ---------- sequences ----------
  - tag: seq_china
    type: sequence
    args:
      - exec: $forward_china

  - tag: seq_remote
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: $forward_remote

  - tag: seq_cloudflare
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: $forward_cloudflare

  - tag: main
    type: sequence
    args:
      - exec: $cache
      - matches: has_resp
        exec: accept
      # Apple TV+/Music streaming -> Cloudflare (international CDN) [Host]
      - matches: qname $apple_intl_host
        exec: $seq_cloudflare
      - matches: has_resp
        exec: accept
      # Apple international services (PROXY) -> remote DoH
      - matches: qname $apple_intl
        exec: $seq_remote
      - matches: has_resp
        exec: accept
      # iCloud Private Relay / Apple DoH -> clean international DNS
      - matches: qname $apple_relay
        exec: $seq_remote
      - matches: has_resp
        exec: accept
      # Apple domains pinned to China DNS (DIRECT)
      - matches: qname $apple_direct
        exec: $seq_china
      - matches: has_resp
        exec: accept
      # known GFW/proxy domains -> remote directly (skip CN check)
      - matches: qname $geosite_proxy
        exec: $seq_remote
      - matches: has_resp
        exec: accept
      # CN domains -> China upstreams
      - matches: qname $geosite_cn
        exec: $seq_china
      - matches: has_resp
        exec: accept
      # everything else -> remote
      - exec: $seq_remote

  # ---------- servers ----------
  - tag: udp_srv
    type: udp_server
    args:
      entry: main
      listen: "0.0.0.0:5335"

  - tag: tcp_srv
    type: tcp_server
    args:
      entry: main
      listen: "0.0.0.0:5335"
